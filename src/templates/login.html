{% extends "base.html" %}

{% block content %}
  <section class="panel auth-panel">
    <p class="eyebrow">Garden Dashboard</p>
    <h1>{{ app_name }}</h1>
    <p class="lede">Enter the shared password to open the private garden dashboard.</p>

    {% if error_message %}
      <p class="flash flash-error">{{ error_message }}</p>
    {% endif %}

    <form method="post" action="/login" class="stack">
      <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token }}">
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Enter Dashboard</button>
    </form>
  </section>
{% endblock %}
